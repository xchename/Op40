name: Build OpenWrt (Optimized)

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

  # 上传控制
  UPLOAD_FIRMWARE: true

  # 强制 Node 24（避免未来问题）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ✅ 拉代码
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ Node 24（新版）
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # ✅ 初始化环境（瘦身 + 清空间）
    - name: Initialization environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/*
        sudo apt-get -qq update
        sudo apt-get -qq install $(curl -fsSL https://is.gd/openwrt_depends)
        sudo apt-get -qq autoremove --purge
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"

    # ✅ 克隆源码
    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    # ✅ 缓存 dl（大幅加速）
    - name: Cache dl
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: dl-${{ github.run_id }}
        restore-keys: |
          dl-

    # ✅ 自定义 feeds
    - name: Load custom feeds
      run: |
        [ -e feeds.conf.default ] && mv feeds.conf.default openwrt/
        chmod +x $DIY_P1_SH
        cd openwrt
        ../$DIY_P1_SH

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ✅ 加载配置
    - name: Load configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        ../$DIY_P2_SH

    # ✅ SSH 调试（保留）
    - name: SSH connection
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.ssh == 'true'

    # ✅ 下载依赖
    - name: Download packages
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -delete

    # ✅ 编译（自动 fallback）
    - name: Compile
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s

        echo "status=success" >> $GITHUB_OUTPUT

        DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/')
        echo "DEVICE_NAME=_${DEVICE}" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # ✅ 整理固件
    - name: Organize firmware
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    # ✅ 上传固件
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: OpenWrt${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # ✅ 自动清理旧 Artifact（替代 GitRML）
    - name: Delete old artifacts
      run: |
        gh api repos/${{ github.repository }}/actions/artifacts \
        --jq '.artifacts[] | select(.expired==false) | .id' \
        | tail -n +10 \
        | xargs -r -n1 -I {} gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/{}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
